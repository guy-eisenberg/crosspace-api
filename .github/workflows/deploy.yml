name: Deploy
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: "prod"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23.x"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: "production"
          SITE_URL: ${{vars.SITE_URL}}
          TWILIO_SID: ${{secrets.TWILIO_SID}}
          TWILIO_AUTH_TOKEN: ${{secrets.TWILIO_AUTH_TOKEN}}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{vars.HOST}}
          username: "ubuntu"
          key: ${{secrets.KEY}}
          port: 22
          source: "./package.json,./package-lock.json,build/*"
          target: "/var/www/crosspace/api"
          strip_components: 1
